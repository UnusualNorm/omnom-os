on:
  schedule:
    - cron: "0 0 * * *"
  push:
  pull_request:
  workflow_dispatch:

env:
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
  IMAGE_PR_TAG: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Remove software
        uses: ublue-os/remove-unwanted-software@v9
        
      - name: Move storage
        run: |
          sudo mkdir -p /mnt/containers/storage
          sudo tee /etc/containers/storage.conf > /dev/null <<'EOF'
          [storage]
          driver = "overlay"
          graphroot = "/mnt/containers/storage"
          runroot = "/run/containers/storage"
          EOF
          sudo podman info --format 'GraphRoot={{.Store.GraphRoot}}'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Lowercase name
        id: name_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_NAME }}

      - name: Build image
        run: sudo podman build . --layers=false --no-cache -t ${{ steps.name_case.outputs.lowercase }}

      - name: Lowercase registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Log in
        run: sudo podman login --username "${{ env.REGISTRY_USER }}" --password "${{ env.REGISTRY_PASSWORD }}" "${{ steps.registry_case.outputs.lowercase }}"

      - name: Lowercase tag
        id: tag_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.event_name == 'pull_request' && env.IMAGE_PR_TAG || env.IMAGE_TAG }}

      - name: Tag and push image
        run: |
          sudo podman tag ${{ steps.name_case.outputs.lowercase }} ${{ steps.tag_case.outputs.lowercase }}
          sudo podman push ${{ steps.tag_case.outputs.lowercase }}
